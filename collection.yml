    items:
      - info:
          name: Auth
          type: folder
          seq: 1
        request:
          auth: inherit
        items:
          - info:
              name: login
              type: http
              seq: 1
            http:
              method: POST
              url: '{{url}}/v1/auth/login'
              headers:
                - name: Accept
                  value: application/json
                - name: Content-Type
                  value: multipart/form-data
                - name: X-Client-Type
                  value: web
              body:
                type: multipart-form
                data:
                  - name: email
                    type: text
                    value: admin@example.com
                  - name: password
                    type: text
                    value: password
              auth: inherit
            script:
              res: |
                let jsonResponse = res.getBody();

                if (jsonResponse.status && jsonResponse.data.token) {
                    bru.setEnvVar("token", jsonResponse.data.token);
                    console.log("Token has been set: " + jsonResponse.data.token);
                }
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
              name: logout
              type: http
              seq: 2
            http:
              method: POST
              url: '{{url}}/v1/auth/logout'
              headers:
                - name: Accept
                  value: application/json
                - name: X-Client-Type
                  value: web
              auth:
                type: bearer
                token: '{{token}}'
            settings:
              encodeUrl: true
              timeout: 0
              followRedirects: true
              maxRedirects: 5
          - info:
