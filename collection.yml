opencollection: 0.1.0
info:
  name: Rakime
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: local
      variables:
        - name: url
          value: 127.0.0.1:8000
        - name: token
          value: 2|U5zB8yhluJRY3LFzygdHw4nzJhOrOtZs8M1iWxDW2d5f9ec3
    - name: prod
